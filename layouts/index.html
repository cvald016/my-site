{{ define "main" }}
<section class="home">
  <div class="intro">
    {{ .Content }}
  </div>

  {{ $posts := where .Site.RegularPages "Section" "posts" }}
  {{ if $posts }}
  <section class="recent-posts">
    <h2>Recent Writing</h2>
    <ul class="post-list">
      {{ range first 5 $posts }}
      <li>
        <span class="post-date">{{ .Date.Format "Jan 2, 2006" }}</span>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
      </li>
      {{ end }}
    </ul>
    {{ if gt (len $posts) 5 }}
    <a href="/posts/" class="all-posts">All posts →</a>
    {{ end }}
  </section>
  {{ end }}
</section>
{{ end }}
