{{ define "main" }}
<section class="post-archive">
  <h1>{{ .Title }}</h1>
  <ul class="post-list">
    {{ range .Pages }}
    <li>
      <span class="post-date">{{ .Date.Format "Jan 2, 2006" }}</span>
      <a href="{{ .RelPermalink }}">{{ .Title }}</a>
    </li>
    {{ end }}
  </ul>
</section>
{{ end }}
